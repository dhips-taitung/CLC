<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文競賽管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .score-input { width: 75px; text-align: center; border: 1px solid #ced4da; border-radius: 4px; padding: 4px; }
        .u-cell { color: #0d6efd; font-weight: 700; background-color: #f8fbfe; }
        .y-cell { color: #198754; font-weight: 700; font-size: 1.05rem; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner-border text-primary mb-3"></div>
    <h5 id="loadMsg" class="text-muted">連線中...</h5>
</div>

<div class="container-fluid">
    <!-- 頂部設定區 -->
    <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-4">競賽名稱: <input type="text" id="h-name" class="form-control form-control-sm h-input"></div>
            <div class="col-md-4">核定文號: <input type="text" id="h-doc" class="form-control form-control-sm h-input"></div>
            <div class="col-md-2">組別: 
                <select id="h-group" class="form-select form-select-sm h-input">
                    <option>國小組</option><option>國中組</option><option>高中組</option><option>社會組</option><option>教師組</option>
                </select>
            </div>
            <div class="col-md-2">項目: 
                <select id="h-item" class="form-select form-select-sm h-input">
                    <option>字音字形</option><option>朗讀</option><option>作文</option><option>演說</option><option>寫字</option>
                </select>
            </div>
            <div class="col-md-2">評審人數: <input type="number" id="h-judges" class="form-control form-control-sm h-input" value="3"></div>
            <div class="col-md-4">承辦學校: <input type="text" id="h-school" class="form-control form-control-sm h-input"></div>
            <div class="col-md-6 d-flex align-items-end justify-content-end gap-2">
                <button id="btn-edit" class="btn btn-sm btn-outline-secondary" onclick="toggleHeader(false)">編輯設定</button>
                <button id="btn-write" class="btn btn-sm btn-primary px-3" onclick="saveHeaderAction()">鎖定並更新名單</button>
                <button id="btn-summary" class="btn btn-sm btn-warning" onclick="handleSummary()">產生總表</button>
                <button id="btn-word" class="btn btn-sm btn-info text-white d-none" onclick="downloadWord()">下載 Word</button>
                <button id="btn-archive" class="btn btn-sm btn-danger px-3" onclick="handleArchive()">寫入資料庫</button>
            </div>
        </div>
    </div>

    <!-- 成績編輯區 -->
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 fw-bold">成績登錄表</h5>
            <div class="gap-2 d-flex">
                <button id="btn-refresh" class="btn btn-sm btn-outline-primary" onclick="handleAction('getData')">刷新數據</button>
                <button id="btn-saveall" class="btn btn-sm btn-success px-4" onclick="handleSaveAll()">全部儲存</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 50px;">序</th><th>評審1</th><th>評審2</th><th>評審3</th>
                        <th class="u-cell">均一分</th><th id="thV">V</th><th id="thW">W</th>
                        <th>扣分</th><th>總成績</th><th style="width:60px;">名次</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="scoreBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ 務必替換此網址為您的 GAS 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxx2ntG5zvDaJciL4nX6OIKTcks2TjJoD99jpUhSw5LAWpB99yjDzgIfj407YUmBWZ0/exec"; 
    
    let activeRows = [];
    let lastSummaryData = null;
    let isRequesting = false;

    // 通用 API 請求函式
    async function handleAction(action, data = null, retries = 3) {
        if (isRequesting) return;
        isRequesting = true;
        showLoading(true, "連線雲端中...");
        
        const body = { action: action };
        if (action === 'updateBatch') body.dataList = data; 
        else if (data) body.data = data;

        for (let i = 0; i < retries; i++) {
            try {
                const resp = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(body),
                    mode: 'cors' 
                });
                
                if (!resp.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${resp.status}`);
                const result = await resp.json();
                
                if (result.rows) renderUI(result);
                if (result.result && action !== 'getData' && action !== 'saveHeader') {
                    alert(result.result);
                }
                
                isRequesting = false;
                showLoading(false);
                return;
            } catch (err) {
                console.warn(`嘗試第 ${i+1} 次失敗:`, err);
                if (i === retries - 1) {
                    alert("連線失敗！\n\n錯誤資訊：" + err.message);
                } else {
                    await new Promise(r => setTimeout(r, 2000));
                }
            }
        }
        isRequesting = false;
        showLoading(false);
    }

    // 鎖定設定並更新名單
    async function saveHeaderAction() {
        const data = {
            name: document.getElementById("h-name").value,
            doc: document.getElementById("h-doc").value,
            group: document.getElementById("h-group").value,
            item: document.getElementById("h-item").value,
            judges: document.getElementById("h-judges").value,
            school: document.getElementById("h-school").value
        };
        await handleAction('saveHeader', data);
    }

    // 處理總表產生
    async function handleSummary() {
        showLoading(true, "正在產生總表...");
        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "generateSummary" }) });
            const result = await resp.json();
            if (result.docData) {
                lastSummaryData = result;
                const btnWord = document.getElementById('btn-word');
                if(btnWord) btnWord.classList.remove('d-none');
                alert("總表產生成功！您可以下載 Word 檔案。");
            } else {
                alert(result.result || "查無符合資料");
            }
        } catch (err) { alert("連線失敗：" + err.message); }
        showLoading(false);
    }

    // 渲染 UI 表格
    function renderUI(res) {
        const elName = document.getElementById("h-name");
        const elDoc = document.getElementById("h-doc");
        const elGroup = document.getElementById("h-group");
        const elItem = document.getElementById("h-item");
        const elJudges = document.getElementById("h-judges");
        const elSchool = document.getElementById("h-school");

        if(elName) elName.value = res.header.name || "";
        if(elDoc) elDoc.value = res.header.doc || "";
        if(elGroup) elGroup.value = res.header.group || "國小組";
        if(elItem) elItem.value = res.header.item || "演說";
        if(elJudges) elJudges.value = res.header.judges || 3;
        if(elSchool) elSchool.value = res.header.school || "";
        
        toggleHeader(!!res.header.name);

        const vHead = document.getElementById("thV"), wHead = document.getElementById("thW");
        if (vHead && wHead) {
            if (res.project === "寫字") { vHead.innerText = "錯漏字"; wHead.innerText = "未寫完"; }
            else if (res.project === "演說") { vHead.innerText = "-"; wHead.innerText = "時間"; }
        }

        const body = document.getElementById("scoreBody");
        if(!body) return;
        body.innerHTML = ""; activeRows = [];
        res.rows.forEach((row, i) => {
            if (!row[0]) return;
            const rIdx = i + 3; activeRows.push(rIdx);
            body.innerHTML += `<tr><td>${row[0]}</td><td><input type="number" class="score-input" id="e-${rIdx}" value="${row[4]}"></td><td><input type="number" class="score-input" id="i-${rIdx}" value="${row[8]}"></td><td><input type="number" class="score-input" id="m-${rIdx}" value="${row[12]}"></td><td class="u-cell">${row[20] ? parseFloat(row[20]).toFixed(2) : ""}</td><td><input type="number" class="score-input" id="v-${rIdx}" value="${row[21]}"></td><td><input type="number" step="0.01" class="score-input" id="w-${rIdx}" value="${row[22]}"></td><td class="text-danger fw-bold">${row[23]}</td><td class="y-cell">${row[24] ? parseFloat(row[24]).toFixed(2) : ""}</td><td class="fw-bold">${row[31] || ""}</td><td><button class="btn btn-dark btn-sm" onclick="handleSaveSingle(${rIdx})">儲存</button></td></tr>`;
        });
    }

    function handleSaveSingle(rIdx) {
        handleAction('updateBatch', [{ row: rIdx, e: document.getElementById(`e-${rIdx}`).value, i: document.getElementById(`i-${rIdx}`).value, m: document.getElementById(`m-${rIdx}`).value, v: document.getElementById(`v-${rIdx}`).value, w: document.getElementById(`w-${rIdx}`).value }]);
    }

    function handleSaveAll() {
        const list = activeRows.map(r => ({ row: r, e: document.getElementById(`e-${r}`).value, i: document.getElementById(`i-${r}`).value, m: document.getElementById(`m-${r}`).value, v: document.getElementById(`v-${r}`).value, w: document.getElementById(`w-${r}`).value }));
        handleAction('updateBatch', list);
    }

    function handleArchive() { if (confirm("確定寫入資料庫並清空目前名單？")) handleAction('writeToDatabase'); }
    
    // 切換表頭鎖定狀態 (防錯修正)
    function toggleHeader(lock) { 
        document.querySelectorAll(".h-input").forEach(el => el.disabled = lock); 
        const btnWrite = document.getElementById("btn-write");
        if(btnWrite) btnWrite.disabled = lock;
    }

    // 顯示/隱藏載入中 (防錯修正)
    function showLoading(show, txt) { 
        const elLoad = document.getElementById("loading");
        const elMsg = document.getElementById("loadMsg");
        if(elLoad) elLoad.style.display = show ? "flex" : "none"; 
        if(elMsg) elMsg.innerText = txt; 
        
        // 批次停用所有按鈕防止重複點擊
        document.querySelectorAll("button").forEach(btn => {
            // 如果是編輯按鈕且正在載入中，也停用；如果載入結束，則啟用
            btn.disabled = show; 
        });
        
        // 載入結束後，根據鎖定狀態恢復按鈕
        if(!show) {
            const elName = document.getElementById("h-name");
            if(elName) toggleHeader(elName.disabled);
        }
    }
    
    // Word 下載邏輯
    function downloadWord() {
        if (!lastSummaryData) return;
        const info = lastSummaryData.docInfo;
        const rows = lastSummaryData.docData;
        
        let tableHtml = rows.map(r => `<tr><td style="border:1px solid black; text-align:center;">${r[0]}</td><td style="border:1px solid black; text-align:center;">${r[1]}</td><td style="border:1px solid black; text-align:center;">${r[2]}</td><td style="border:1px solid black; text-align:center;">${r[3]}</td><td style="border:1px solid black; text-align:center;">${r[4]}</td><td style="border:1px solid black; text-align:center;">${r[5]}</td></tr>`).join('');
        
        const content = `
        <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'>
        <style>
            @page { size: A4; margin: 1.5cm; }
            body { font-family: "微軟正黑體", sans-serif; font-size: 11pt; }
            h2 { text-align: center; margin-bottom: 5px; }
            .info-box { width: 100%; margin-bottom: 10px; }
            table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
            th, td { border: 1px solid black; padding: 4px; font-size: 10pt; }
            .sign-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            .sign-table td { border: 1px solid black; height: 60px; vertical-align: middle; text-align: center; }
            .label-cell { width: 15%; background-color: #f2f2f2; font-weight: bold; }
        </style>
        </head>
        <body>
            <h2>語文競賽成績總表</h2>
            <div class="info-box">承辦學校：${info.school} <br>組別：${info.group} &nbsp;&nbsp; 項目：${info.item} &nbsp;&nbsp; 錄取名額：${info.quota}名</div>
            <table><thead><tr style="background-color:#eee;"><th style="width:10%;">競賽序</th><th>評審1</th><th>評審2</th><th>評審3</th><th style="width:15%;">總成績</th><th style="width:15%;">名次</th></tr></thead><tbody>${tableHtml}</tbody></table>
            <table class="sign-table">
                <tr><td class="label-cell">評審簽名：</td><td style="width:18%;"></td><td style="width:18%;"></td><td style="width:18%;"></td><td class="label-cell">成績組：</td><td style="width:16%;"></td></tr>
                <tr><td class="label-cell" style="height:40px;">成績檢核：</td><td colspan="3"></td><td class="label-cell">承辦人：</td><td></td></tr>
            </table>
        </body></html>`;
        
        const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${info.group}_${info.item}_成績總表.doc`;
        link.click();
    }

    window.onload = () => handleAction('getData');
</script>
</body>
</html>
