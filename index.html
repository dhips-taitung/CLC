<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文競賽成績編輯系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 20px; font-family: "Microsoft JhengHei", sans-serif; }
        .table-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-x: auto; }
        .score-input { width: 85px; text-align: center; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .u-column { background-color: #f0f7ff; font-weight: bold; color: #0d6efd; width: 100px; }
        .y-column { font-weight: bold; color: #198754; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner-border text-primary mb-2"></div>
    <span id="loadingText">正在處理全體成績...</span>
</div>

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-end mb-3">
        <div>
            <h2 class="mb-1">語文競賽成績編輯系統</h2>
            <div id="projectDisplay" class="text-muted">連線中...</div>
        </div>
        <button class="btn btn-outline-primary" onclick="loadData()">刷新數據</button>
    </div>

    <div class="table-container">
        <table class="table table-bordered align-middle text-center">
            <thead class="table-dark">
                <tr>
                    <th>序</th>
                    <th>評審1</th>
                    <th>評審2</th>
                    <th>評審3</th>
                    <th>均一分數(U)</th>
                    <th id="labelV">V欄</th>
                    <th id="labelW">W欄</th>
                    <th>扣分(X)</th>
                    <th>總成績(Y)</th>
                    <th>名次</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="scoreTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 務必替換為您的 GAS 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycby3q2yneaaiWIVXvyyW6ueGT5Z6UTUWLQ87GSSuSBEFqDfUCUy8Q7Y4H1l6tWkBsmD8/exec";

    async function loadData() {
        toggleLoading(true, "讀取雲端資料中...");
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getData" })
            });
            const data = await response.json();
            document.getElementById("projectDisplay").innerText = `${data.project} | ${data.group} | 評審：${data.judges}人`;
            updateHeaders(data.project);
            renderTable(data.rows);
        } catch (e) {
            alert("讀取失敗：" + e.message);
        }
        toggleLoading(false);
    }

    function updateHeaders(project) {
        const v = document.getElementById("labelV");
        const w = document.getElementById("labelW");
        if (project === "寫字") {
            v.innerText = "錯漏字"; w.innerText = "未寫完";
        } else if (project === "演說") {
            v.innerText = "(無)"; w.innerText = "時間";
        } else {
            v.innerText = "V"; w.innerText = "W";
        }
    }

    function renderTable(rows) {
        const body = document.getElementById("scoreTableBody");
        body.innerHTML = "";
        rows.forEach((row, index) => {
            if (!row[0]) return;
            const rIdx = index + 3;
            // 修正 NaN 顯示問題
            const uVal = isNaN(parseFloat(row[20])) ? "0.00" : parseFloat(row[20]).toFixed(2);
            const yVal = isNaN(parseFloat(row[24])) ? "0.00" : parseFloat(row[24]).toFixed(2);
            
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${row[0]}</td>
                <td><input type="number" class="form-control score-input mx-auto" id="e-${rIdx}" value="${row[4]||0}"></td>
                <td><input type="number" class="form-control score-input mx-auto" id="i-${rIdx}" value="${row[8]||0}"></td>
                <td><input type="number" class="form-control score-input mx-auto" id="m-${rIdx}" value="${row[12]||0}"></td>
                <td class="u-column">${uVal}</td>
                <td><input type="number" class="form-control score-input mx-auto" id="v-${rIdx}" value="${row[21]||0}"></td>
                <td><input type="number" step="0.01" class="form-control score-input mx-auto" id="w-${rIdx}" value="${row[22]||0}"></td>
                <td class="text-danger fw-bold">${row[23] || 0}</td>
                <td class="y-column">${yVal}</td>
                <td class="fs-5">${row[31] || ""}</td>
                <td><button class="btn btn-sm btn-dark px-3" onclick="saveRow(${rIdx})">儲存</button></td>
            `;
            body.appendChild(tr);
        });
    }

    async function saveRow(rIdx) {
        toggleLoading(true, "計算並存回雲端...");
        const payload = {
            action: "updateScore",
            data: {
                row: rIdx,
                e: Number(document.getElementById(`e-${rIdx}`).value),
                i: Number(document.getElementById(`i-${rIdx}`).value),
                m: Number(document.getElementById(`m-${rIdx}`).value),
                v: Number(document.getElementById(`v-${rIdx}`).value),
                w: Number(document.getElementById(`w-${rIdx}`).value)
            }
        };
        try {
            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            setTimeout(loadData, 1200); // 延時載入確保雲端已同步完成
        } catch (e) {
            alert("儲存出錯");
            toggleLoading(false);
        }
    }

    function toggleLoading(show, text = "") {
        document.getElementById("loading").style.display = show ? "flex" : "none";
        document.getElementById("loadingText").innerText = text;
    }

    window.onload = loadData;
</script>

</body>
</html>
