<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文競賽管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .score-input { width: 75px; text-align: center; border: 1px solid #ced4da; border-radius: 4px; padding: 4px; }
        .u-cell { color: #0d6efd; font-weight: 700; background-color: #f8fbfe; }
        .y-cell { color: #198754; font-weight: 700; font-size: 1.05rem; }
        .is-locked { background-color: #fff3f3; color: #dc3545; font-weight: bold; border: 1px solid #dc3545; padding: 5px; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner-border text-primary mb-3"></div>
    <h5 id="loadMsg" class="text-muted">連線中...</h5>
</div>

<div class="container-fluid">
    <div class="card p-4">
        <div id="lockStatus" class="mb-3 d-none"><span class="is-locked">🔒 此項目已鎖定(已完賽)</span></div>
        <div class="row g-3">
            <div class="col-md-4">競賽名稱: <input type="text" id="h-name" class="form-control form-control-sm h-input"></div>
            <div class="col-md-4">文號: <input type="text" id="h-doc" class="form-control form-control-sm h-input"></div>
            <div class="col-md-2">組別: <select id="h-group" class="form-select form-select-sm h-input"><option>國小組</option><option>國中組</option><option>高中組</option><option>社會組</option><option>教師組</option></select></div>
            <div class="col-md-2">項目: <select id="h-item" class="form-select form-select-sm h-input"><option>作文</option><option>演說</option><option>寫字</option><option>朗讀</option></select></div>
            <div class="col-md-2">評審人數: <input type="number" id="h-judges" class="form-control form-control-sm h-input" value="3"></div>
            <div class="col-md-4">承辦學校: <input type="text" id="h-school" class="form-control form-control-sm h-input"></div>
            <div class="col-md-6 d-flex align-items-end justify-content-end gap-2">
                <button id="btn-unlock" class="btn btn-sm btn-outline-danger d-none" onclick="unlockAction()">🔓 解除鎖定</button>
                <button id="btn-edit" class="btn btn-sm btn-outline-secondary" onclick="toggleHeader(false)">編輯設定</button>
                <button id="btn-write" class="btn btn-sm btn-primary px-3" onclick="saveHeaderAction()">鎖定並更新名單</button>
                <button class="btn btn-sm btn-warning" onclick="handleSummary()">產生總表(Word)</button>
                <button id="btn-word" class="btn btn-sm btn-info text-white d-none" onclick="downloadWord()">下載 Word</button>
                <button id="btn-db" class="btn btn-sm btn-danger px-3" onclick="handleArchive()">存檔至資料庫</button>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 fw-bold">成績登錄表 (按 Enter 可垂直跳格)</h5>
            <button id="btn-saveall" class="btn btn-sm btn-success px-4" onclick="handleSaveAll()">全部儲存</button>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr><th style="width: 50px;">競賽序</th><th>評審 1</th><th>評審 2</th><th>評審 3</th><th class="u-cell">均一分</th><th id="thV">V</th><th id="thW">W</th><th>扣分</th><th>總成績</th><th>名次</th><th>操作</th></tr>
                </thead>
                <tbody id="scoreBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxMHstMw1LXnM2hmyYj03HZwpC5dhF6td27VNHBw7oZi6CxLuL8QJiD1X4qMYv64rSa/exec"; // ⚠️替換網址
    
    let activeRows = [];
    let lastSummaryData = null;

    async function handleAction(action, data = null) {
        showLoading(true, "處理中...");
        const body = { action: action };
        if (action === 'updateBatch') body.dataList = data; else if (data) body.data = data;
        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
            const result = await resp.json();
            if (result.rows) renderUI(result);
            if (result.result && action !== 'getData' && action !== 'saveHeader') alert(result.result || result.message);
            showLoading(false);
        } catch (err) { alert("連線失敗"); showLoading(false); }
    }

    async function saveHeaderAction() {
        const data = { name: document.getElementById("h-name").value, doc: document.getElementById("h-doc").value, group: document.getElementById("h-group").value, item: document.getElementById("h-item").value, judges: document.getElementById("h-judges").value, school: document.getElementById("h-school").value };
        await handleAction('saveHeader', data);
    }

    async function unlockAction() {
        if (!confirm("確定要解除鎖定嗎？")) return;
        const data = { group: document.getElementById("h-group").value, item: document.getElementById("h-item").value };
        await handleAction('unlockItem', data);
        handleAction('getData');
    }

    async function handleSummary() {
        showLoading(true, "產生 Word 中...");
        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "generateSummary" }) });
            const result = await resp.json();
            if (result.docData) {
                lastSummaryData = result;
                document.getElementById('btn-word').classList.remove('d-none');
                alert("總表產生成功！");
            } else alert(result.result || "無資料");
        } catch (err) { alert("連線失敗"); }
        showLoading(false);
    }

    function renderUI(res) {
        document.getElementById("h-name").value = res.header.name || "";
        document.getElementById("h-doc").value = res.header.doc || "";
        document.getElementById("h-group").value = res.header.group || "國小組";
        document.getElementById("h-item").value = res.header.item || "作文";
        document.getElementById("h-judges").value = res.header.judges || 3;
        document.getElementById("h-school").value = res.header.school || "";
        
        const lockStatus = document.getElementById("lockStatus"), btnUnlock = document.getElementById("btn-unlock"), btnSaveAll = document.getElementById("btn-saveall"), btnWrite = document.getElementById("btn-write"), btnDb = document.getElementById("btn-db");
        if (res.isLocked) {
            lockStatus.classList.remove('d-none'); btnUnlock.classList.remove('d-none'); btnSaveAll.disabled = true; btnWrite.disabled = true; btnDb.disabled = true; toggleHeader(true);
        } else {
            lockStatus.classList.add('d-none'); btnUnlock.classList.add('d-none'); btnSaveAll.disabled = false; btnDb.disabled = false; toggleHeader(!!res.header.name);
        }

        const vHead = document.getElementById("thV"), wHead = document.getElementById("thW");
        if (res.project === "寫字") { vHead.innerText = "錯漏字"; wHead.innerText = "未寫完"; }
        else if (res.project === "演說") { vHead.innerText = "-"; wHead.innerText = "時間"; }

        const body = document.getElementById("scoreBody");
        body.innerHTML = ""; activeRows = [];
        res.rows.forEach((row, i) => {
            if (!row[0]) return;
            const rIdx = i + 3; activeRows.push(rIdx);
            body.innerHTML += `<tr><td>${row[0]}</td><td><input type="number" class="score-input" id="e-${rIdx}" value="${row[4]}" onkeydown="handleEnter(event)" ${res.isLocked?'disabled':''}></td><td><input type="number" class="score-input" id="i-${rIdx}" value="${row[8]}" onkeydown="handleEnter(event)" ${res.isLocked?'disabled':''}></td><td><input type="number" class="score-input" id="m-${rIdx}" value="${row[12]}" onkeydown="handleEnter(event)" ${res.isLocked?'disabled':''}></td><td class="u-cell">${row[20] ? parseFloat(row[20]).toFixed(2) : ""}</td><td><input type="number" class="score-input" id="v-${rIdx}" value="${row[21]}" onkeydown="handleEnter(event)" ${res.isLocked?'disabled':''}></td><td><input type="number" step="0.01" class="score-input" id="w-${rIdx}" value="${row[22]}" onkeydown="handleEnter(event)" ${res.isLocked?'disabled':''}></td><td class="text-danger fw-bold">${row[23]}</td><td class="y-cell">${row[24] ? parseFloat(row[24]).toFixed(2) : ""}</td><td class="fw-bold">${row[31] || ""}</td><td><button class="btn btn-dark btn-sm" onclick="handleSaveSingle(${rIdx})" ${res.isLocked?'disabled':''}>儲存</button></td></tr>`;
        });
    }

    // 核心功能：垂直 Enter 跳格
    function handleEnter(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            const currentId = event.target.id;
            const parts = currentId.split('-');
            const prefix = parts[0];
            const currentRIdx = parseInt(parts[1]);
            
            // 尋找 activeRows 中的下一個有效 rIdx
            const currentPos = activeRows.indexOf(currentRIdx);
            if (currentPos !== -1 && currentPos < activeRows.length - 1) {
                const nextRIdx = activeRows[currentPos + 1];
                const nextEl = document.getElementById(`${prefix}-${nextRIdx}`);
                if (nextEl) {
                    nextEl.focus();
                    nextEl.select(); // 自動全選，方便輸入
                }
            }
        }
    }

    function handleSaveSingle(rIdx) { handleAction('updateBatch', [{ row: rIdx, e: document.getElementById(`e-${rIdx}`).value, i: document.getElementById(`i-${rIdx}`).value, m: document.getElementById(`m-${rIdx}`).value, v: document.getElementById(`v-${rIdx}`).value, w: document.getElementById(`w-${rIdx}`).value }]); }
    function handleSaveAll() { const list = activeRows.map(r => ({ row: r, e: document.getElementById(`e-${r}`).value, i: document.getElementById(`i-${r}`).value, m: document.getElementById(`m-${r}`).value, v: document.getElementById(`v-${r}`).value, w: document.getElementById(`w-${r}`).value })); handleAction('updateBatch', list); }
    function handleArchive() { if (confirm("確定存檔？")) handleAction('writeToDatabase'); }
    function toggleHeader(lock) { document.querySelectorAll(".h-input").forEach(el => el.disabled = lock); if(!lock) document.getElementById("btn-write").disabled = false; }
    function showLoading(show, txt) { document.getElementById("loading").style.display = show ? "flex" : "none"; document.getElementById("loadMsg").innerText = txt; }
    
    function downloadWord() {
        if (!lastSummaryData) return;
        const info = lastSummaryData.docInfo, rows = lastSummaryData.docData;
        let tableRows = rows.map(r => `<tr><td style="border:1pt solid black; text-align:center; padding:3px;">${r[0]}</td><td style="border:1pt solid black; text-align:center; padding:3px;">${r[1]}</td><td style="border:1pt solid black; text-align:center; padding:3px;">${r[2]}</td><td style="border:1pt solid black; text-align:center; padding:3px;">${r[3]}</td><td style="border:1pt solid black; text-align:center; padding:3px;">${r[4]}</td><td style="border:1pt solid black; text-align:center; padding:3px;">${r[5]}</td></tr>`).join('');
        const content = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><style>@page { size: 21cm 29.7cm; margin: 1cm 1.5cm 1cm 1.5cm; } body { font-family: "微軟正黑體", "標楷體", sans-serif; font-size: 11pt; color: black; line-height: 1.2; } .header-table { width: 100%; border: none; margin-bottom: 5px; } .title-cell { text-align: center; font-size: 15pt; font-weight: bold; width: 80%; padding-left: 10%; } .organizer-cell { text-align: left; vertical-align: top; font-size: 10pt; width: 20%; line-height: 1.1; } .sub-title { width: 100%; text-align: center; font-size: 14pt; border: none; padding: 10px 0; margin-bottom: 0; } .grade-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 0px; } .grade-table th, .grade-table td { border: 1pt solid black; padding: 4px; text-align: center; font-size: 11pt; } .grade-table th { background-color: #ffffff; font-weight: normal; } .sign-table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: -1pt; } .sign-table td { border: 1pt solid black; height: 78px; vertical-align: middle; text-align: left; padding: 4px; font-size: 11pt; } .sign-label { vertical-align: top; }</style></head><body><table class="header-table"><tr><td class="title-cell">${info.title}</td><td class="organizer-cell">承辦單位：<br>${info.school}</td></tr></table><div class="sub-title">${info.group} ${info.item}</div><table class="grade-table"><thead><tr><th style="width:13%;">競賽序</th><th style="width:17%;">評審1</th><th style="width:17%;">評審2</th><th style="width:17%;">評審3</th><th style="width:17%;">成績</th><th style="width:19%;">名次等第</th></tr></thead><tbody>${tableRows}</tbody></table><table class="sign-table"><tr><td style="width:13%;" class="sign-label">評審<br>簽名：</td><td style="width:17%;"></td><td style="width:17%;"></td><td style="width:17%;"></td><td style="width:17%; vertical-align:middle; text-align:left;">成績組：</td><td style="width:19%;"></td></tr><tr><td class="sign-label" style="height:40px;">成績<br>檢核：</td><td colspan="3"></td><td style="vertical-align:middle; text-align:left;">承辦人：</td><td></td></tr></table></body></html>`;
        const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${info.group}_${info.item}_成績總表.doc`;
        link.click();
    }
    window.onload = () => handleAction('getData');
</script>
</body>
</html>
