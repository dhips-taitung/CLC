<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文競賽管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; padding: 20px; font-family: sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .score-input { width: 70px; text-align: center; border: 1px solid #ced4da; border-radius: 4px; padding: 4px; }
        .u-cell { color: #0d6efd; font-weight: 700; background-color: #f8fbfe; }
        .y-cell { color: #198754; font-weight: 700; font-size: 1.05rem; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.85); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div class="loading" id="loading">
    <div class="spinner-border text-primary mb-3"></div>
    <h5 id="loadMsg" class="text-muted">處理中...</h5>
</div>

<div class="container-fluid">
    <!-- 頂部設定 -->
    <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-4">競賽名稱: <input type="text" id="h-name" class="form-control form-control-sm h-input"></div>
            <div class="col-md-4">核定文號: <input type="text" id="h-doc" class="form-control form-control-sm h-input"></div>
            <div class="col-md-2">組別: 
                <select id="h-group" class="form-select form-select-sm h-input">
                    <option>國小組</option><option>國中組</option><option>高中組</option><option>社會組</option><option>教師組</option>
                </select>
            </div>
            <div class="col-md-2">項目: 
                <select id="h-item" class="form-select form-select-sm h-input">
                    <option>字音字形</option><option>朗讀</option><option>作文</option><option>演說</option><option>寫字</option>
                </select>
            </div>
            <div class="col-md-2">評審人數: <input type="number" id="h-judges" class="form-control form-control-sm h-input"></div>
            <div class="col-md-4">承辦學校: <input type="text" id="h-school" class="form-control form-control-sm h-input"></div>
            <div class="col-md-6 d-flex align-items-end justify-content-end gap-2">
                <button class="btn btn-sm btn-outline-secondary" onclick="toggleHeader(false)">編輯</button>
                <button class="btn btn-sm btn-primary px-3" onclick="handleAction('saveHeader')">鎖定並更新名單</button>
                <button class="btn btn-sm btn-warning" onclick="handleAction('generateSummary')">產生總表</button>
                <button class="btn btn-sm btn-danger px-3" onclick="handleArchive()">寫入資料庫</button>
            </div>
        </div>
    </div>

    <!-- 成績表 -->
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 fw-bold">成績登錄表</h5>
            <div class="gap-2 d-flex">
                <button class="btn btn-sm btn-outline-primary" onclick="handleAction('getData')">刷新</button>
                <button class="btn btn-sm btn-success px-4" onclick="handleSaveAll()">全部儲存</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered text-center align-middle">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 50px;">序</th><th>評審1</th><th>評審2</th><th>評審3</th>
                        <th class="u-cell">均一分</th><th id="thV">V</th><th id="thW">W</th>
                        <th>扣分</th><th>總成績</th><th>名次</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="scoreBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby3q2yneaaiWIVXvyyW6ueGT5Z6UTUWLQ87GSSuSBEFqDfUCUy8Q7Y4H1l6tWkBsmD8/exec"; // ⚠️請替換網址
    let activeRows = [];
    let isProcessing = false;

    async function apiRequest(action, data = null, retries = 3) {
        if (isProcessing) return;
        isProcessing = true;
        showLoading(true, "連線中...");
        const body = { action: action };
        if (action === 'updateBatch') body.dataList = data; else if (data) body.data = data;

        for (let i = 0; i < retries; i++) {
            try {
                const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
                const result = await resp.json();
                if (result.result && result.result.includes("成功")) {
                    alert(result.result);
                }
                if (result.rows) renderUI(result);
                isProcessing = false; showLoading(false); return;
            } catch (err) {
                if (i === retries - 1) alert("連線失敗：" + err.message);
                else await new Promise(r => setTimeout(r, 2000));
            }
        }
        isProcessing = false; showLoading(false);
    }

    function renderUI(res) {
        document.getElementById("h-name").value = res.header.name || "";
        document.getElementById("h-doc").value = res.header.doc || "";
        document.getElementById("h-group").value = res.header.group || "國小組";
        document.getElementById("h-item").value = res.header.item || "演說";
        document.getElementById("h-judges").value = res.header.judges || 3;
        document.getElementById("h-school").value = res.header.school || "";
        toggleHeader(!!res.header.name);

        const vHead = document.getElementById("thV"), wHead = document.getElementById("thW");
        if (res.project === "寫字") { vHead.innerText = "錯漏字"; wHead.innerText = "未寫完"; }
        else if (res.project === "演說") { vHead.innerText = "-"; wHead.innerText = "時間"; }

        const body = document.getElementById("scoreBody");
        body.innerHTML = ""; activeRows = [];
        res.rows.forEach((row, i) => {
            if (!row[0]) return;
            const rIdx = i + 3; activeRows.push(rIdx);
            body.innerHTML += `
                <tr>
                    <td>${row[0]}</td>
                    <td><input type="number" class="score-input" id="e-${rIdx}" value="${row[4]}"></td>
                    <td><input type="number" class="score-input" id="i-${rIdx}" value="${row[8]}"></td>
                    <td><input type="number" class="score-input" id="m-${rIdx}" value="${row[12]}"></td>
                    <td class="u-cell">${row[20] ? parseFloat(row[20]).toFixed(2) : ""}</td>
                    <td><input type="number" class="score-input" id="v-${rIdx}" value="${row[21]}"></td>
                    <td><input type="number" step="0.01" class="score-input" id="w-${rIdx}" value="${row[22]}"></td>
                    <td class="text-danger fw-bold">${row[23]}</td>
                    <td class="y-cell">${row[24] ? parseFloat(row[24]).toFixed(2) : ""}</td>
                    <td class="fw-bold">${row[31] || ""}</td>
                    <td><button class="btn btn-dark btn-sm" onclick="handleSaveSingle(${rIdx})">儲存</button></td>
                </tr>
            `;
        });
    }

    function handleAction(action) {
        if (action === 'saveHeader') {
            const data = {
                name: document.getElementById("h-name").value,
                doc: document.getElementById("h-doc").value,
                group: document.getElementById("h-group").value,
                item: document.getElementById("h-item").value,
                judges: document.getElementById("h-judges").value,
                school: document.getElementById("h-school").value
            };
            apiRequest(action, data);
        } else apiRequest(action);
    }

    function handleSaveSingle(rIdx) {
        apiRequest('updateBatch', [{
            row: rIdx, e: document.getElementById(`e-${rIdx}`).value, i: document.getElementById(`i-${rIdx}`).value,
            m: document.getElementById(`m-${rIdx}`).value, v: document.getElementById(`v-${rIdx}`).value, w: document.getElementById(`w-${rIdx}`).value
        }]);
    }

    function handleSaveAll() {
        const list = activeRows.map(rIdx => ({
            row: rIdx, e: document.getElementById(`e-${rIdx}`).value, i: document.getElementById(`i-${rIdx}`).value,
            m: document.getElementById(`m-${rIdx}`).value, v: document.getElementById(`v-${rIdx}`).value, w: document.getElementById(`w-${rIdx}`).value
        }));
        apiRequest('updateBatch', list);
    }

    function handleArchive() {
        if (confirm("確定寫入資料庫並清空目前名單？")) apiRequest('writeToDatabase');
    }

    function toggleHeader(lock) {
        document.querySelectorAll(".h-input").forEach(el => el.disabled = lock);
    }

    function showLoading(show, txt) {
        document.getElementById("loading").style.display = show ? "flex" : "none";
        document.getElementById("loadMsg").innerText = txt;
        document.querySelectorAll("button").forEach(btn => btn.disabled = show);
    }

    window.onload = () => handleAction('getData');
</script>
</body>
</html>
