<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語文競賽管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #3498db; }
        body { background-color: #f0f2f5; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* 徹底隱藏輸入框箭頭 */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .score-input { width: 70px; text-align: center; border: 1px solid #dcdde1; border-radius: 6px; padding: 4px; transition: border 0.2s; }
        .score-input:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1); }
        
        .u-cell { color: #2980b9; font-weight: 700; background-color: #f8fbfe; }
        .y-cell { color: #27ae60; font-weight: 700; font-size: 1.05rem; }
        .rank-cell { font-weight: 700; color: #e67e22; }

        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        .table-responsive { border-radius: 8px; }
        .btn-group-custom { display: flex; gap: 8px; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loading">
    <div class="spinner-grow text-primary mb-3"></div>
    <h5 id="loadMsg" class="text-muted">處理中...</h5>
</div>

<div class="container-fluid">
    <!-- 頂部設定區 -->
    <div class="card p-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label small fw-bold">競賽名稱</label>
                <input type="text" id="h-name" class="form-control form-control-sm h-input">
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold">核定文號</label>
                <input type="text" id="h-doc" class="form-control form-control-sm h-input">
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">組別</label>
                <select id="h-group" class="form-select form-select-sm h-input">
                    <option>國小組</option><option>國中組</option><option>高中組</option><option>社會組</option><option>教師組</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">項目</label>
                <select id="h-item" class="form-select form-select-sm h-input">
                    <option>字音字形</option><option>朗讀</option><option>作文</option><option>演說</option><option>寫字</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">評審人數</label>
                <input type="number" id="h-judges" class="form-control form-control-sm h-input">
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-bold">承辦學校</label>
                <input type="text" id="h-school" class="form-control form-control-sm h-input">
            </div>
            <div class="col-md-6 d-flex align-items-end justify-content-end btn-group-custom">
                <button id="btn-edit" class="btn btn-sm btn-outline-secondary" onclick="toggleHeader(false)">編輯設定</button>
                <button id="btn-write" class="btn btn-sm btn-primary px-4" onclick="handleAction('saveHeader')">寫入並鎖定</button>
                <button class="btn btn-sm btn-danger px-4" onclick="handleArchive()">寫入資料庫</button>
            </div>
        </div>
    </div>

    <!-- 成績操作區 -->
    <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 fw-bold text-dark">成績登錄與名次計算</h5>
            <div class="btn-group-custom">
                <button class="btn btn-sm btn-outline-primary" onclick="handleAction('getData')">刷新</button>
                <button class="btn btn-sm btn-success px-4" onclick="handleSaveAll()">全部儲存</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover table-bordered text-center align-middle bg-white">
                <thead class="table-light">
                    <tr>
                        <th style="width: 50px;">序</th>
                        <th>評審1</th><th>評審2</th><th>評審3</th>
                        <th class="u-cell">均一分</th>
                        <th id="thV">V</th><th id="thW">W</th>
                        <th>扣分</th><th>總成績</th>
                        <th style="width: 70px;">名次</th>
                        <th style="width: 80px;">操作</th>
                    </tr>
                </thead>
                <tbody id="scoreBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ 部署後請替換此網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycby3q2yneaaiWIVXvyyW6ueGT5Z6UTUWLQ87GSSuSBEFqDfUCUy8Q7Y4H1l6tWkBsmD8/exec";
    let activeRows = [];

    // 通用請求處理函數 (優化速度：更新後直接渲染回傳資料)
    async function apiRequest(action, data = null) {
        showLoading(true, "連線中...");
        try {
            const body = { action: action };
            if (data) body.data = data; // 用於單純設定
            if (action === 'updateBatch') body.dataList = data; // 用於成績列表

            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
            const result = await resp.json();
            
            if (result.rows) {
                renderUI(result);
            } else if (result.result === "success") {
                // 如果只是成功訊息但沒帶資料（如封存後），則重新拉取
                handleAction('getData');
            }
        } catch (e) {
            alert("系統錯誤: " + e.message);
        }
        showLoading(false);
    }

    function renderUI(res) {
        // 填充表頭
        document.getElementById("h-name").value = res.header.name || "";
        document.getElementById("h-doc").value = res.header.doc || "";
        document.getElementById("h-group").value = res.header.group || "國小組";
        document.getElementById("h-item").value = res.header.item || "演說";
        document.getElementById("h-judges").value = res.header.judges || 3;
        document.getElementById("h-school").value = res.header.school || "";
        
        toggleHeader(!!res.header.name);
        
        // 欄位名稱優化
        const vHead = document.getElementById("thV"), wHead = document.getElementById("thW");
        if (res.project === "寫字") { vHead.innerText = "錯漏字"; wHead.innerText = "未寫完"; }
        else if (res.project === "演說") { vHead.innerText = "-"; wHead.innerText = "時間"; }
        else { vHead.innerText = "V"; wHead.innerText = "W"; }

        // 渲染表格
        const body = document.getElementById("scoreBody");
        body.innerHTML = "";
        activeRows = [];
        res.rows.forEach((row, i) => {
            if (!row[0]) return;
            const rIdx = i + 3;
            activeRows.push(rIdx);
            body.innerHTML += `
                <tr>
                    <td class="text-muted small">${row[0]}</td>
                    <td><input type="number" class="score-input" id="e-${rIdx}" value="${row[4]}"></td>
                    <td><input type="number" class="score-input" id="i-${rIdx}" value="${row[8]}"></td>
                    <td><input type="number" class="score-input" id="m-${rIdx}" value="${row[12]}"></td>
                    <td class="u-cell">${row[20] ? parseFloat(row[20]).toFixed(2) : ""}</td>
                    <td><input type="number" class="score-input" id="v-${rIdx}" value="${row[21]}"></td>
                    <td><input type="number" step="0.01" class="score-input" id="w-${rIdx}" value="${row[22]}"></td>
                    <td class="text-danger small fw-bold">${row[23]}</td>
                    <td class="y-cell">${row[24] ? parseFloat(row[24]).toFixed(2) : ""}</td>
                    <td class="rank-cell">${row[31] || ""}</td>
                    <td><button class="btn btn-dark btn-sm" onclick="handleSaveSingle(${rIdx})">儲存</button></td>
                </tr>
            `;
        });
    }

    // 操作行為封裝
    function handleAction(action) {
        if (action === 'saveHeader') {
            const data = {
                name: document.getElementById("h-name").value,
                doc: document.getElementById("h-doc").value,
                group: document.getElementById("h-group").value,
                item: document.getElementById("h-item").value,
                judges: document.getElementById("h-judges").value,
                school: document.getElementById("h-school").value
            };
            apiRequest(action, data);
        } else {
            apiRequest(action);
        }
    }

    function handleSaveSingle(rIdx) {
        const item = collect(rIdx);
        apiRequest('updateBatch', [item]);
    }

    function handleSaveAll() {
        const list = activeRows.map(r => collect(r));
        apiRequest('updateBatch', list);
    }

    async function handleArchive() {
        if (!confirm("確定要將資料寫入資料庫並清空名單嗎？此操作不可復原。")) return;
        apiRequest('writeToDatabase');
    }

    function collect(rIdx) {
        return {
            row: rIdx,
            e: document.getElementById(`e-${rIdx}`).value,
            i: document.getElementById(`i-${rIdx}`).value,
            m: document.getElementById(`m-${rIdx}`).value,
            v: document.getElementById(`v-${rIdx}`).value,
            w: document.getElementById(`w-${rIdx}`).value
        };
    }

    function toggleHeader(lock) {
        document.querySelectorAll(".h-input").forEach(el => el.disabled = lock);
        document.getElementById("btn-write").disabled = lock;
    }

    function showLoading(show, txt) {
        document.getElementById("loading").style.display = show ? "flex" : "none";
        document.getElementById("loadMsg").innerText = txt;
    }

    window.onload = () => handleAction('getData');
</script>
</body>
</html>
